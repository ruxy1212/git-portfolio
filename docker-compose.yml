version: '3.8'
services:
  app:
    image: node:20-slim
    user: "node"
    working_dir: /app
    command: >
      sh -c "corepack enable && 
             corepack prepare pnpm@latest --activate && 
             pnpm install && 
             pnpm dev --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules # Important: keeps container modules separate from local
    environment:
      - NODE_ENV=development
    # env_file: 
      - .env